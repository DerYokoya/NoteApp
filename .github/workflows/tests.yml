name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libgl1 libglx-mesa0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-qt pytest-cov

      - name: Run tests (headless via Xvfb)
        uses: coactions/setup-xvfb@v1
        with:
          run: pytest --cov --cov-report=term-missing
